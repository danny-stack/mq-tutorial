# Kafka 学习环境（独立于 RabbitMQ tutorial 的 docker-compose.yml）
# 启动：docker compose -f docker-compose.kafka.yml up -d
# 停止：docker compose -f docker-compose.kafka.yml down
#
# 关键设计：
#   - apache/kafka 用 KRaft 模式（自带元数据管理，无需 ZooKeeper），单容器成 broker+controller
#   - 双 listener：PLAINTEXT(容器间 kafka:9092) + HOST(宿主机 localhost:29092)
#     宿主机 Python 连 localhost:29092；kafka-ui 在容器里连 kafka:9092
#   - KAFKA_HEAP_OPTS 限到 512M，和现有 RabbitMQ 在 6G colima 里共存

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT=容器间(9092)，HOST=宿主机(29092)，CONTROLLER=KRaft 内部(9093)
      KAFKA_LISTENERS: PLAINTEXT://:9092,HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk  # KRaft 要求的 base64 UUID（22 字符）
      # 单节点：内部 topic 副本数全设 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      GROUP_INITIAL_REBALANCE_DELAY_MS: 0  # 学习环境：消费者组重平衡不等延迟
      KAFKA_HEAP_OPTS: -Xms256M -Xmx512M
    ports:
      - "29092:29092"  # 宿主机 Python 连这个；9092 只给容器间用，不映射
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 768m

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    mem_limit: 512m
